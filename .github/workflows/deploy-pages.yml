name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm compatible with Node 22
        run: corepack prepare pnpm@11.2.2 --activate

      - name: Install dependencies (with approve-builds fallback)
        run: |
          set -euo pipefail
          echo "Running pnpm install --frozen-lockfile"
          if ! pnpm install --frozen-lockfile; then
            echo "pnpm install failed due to ignored builds; approving all and retrying"
            pnpm approve-builds --all || true
            pnpm install --frozen-lockfile
          fi

      - name: Build
        run: pnpm build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
